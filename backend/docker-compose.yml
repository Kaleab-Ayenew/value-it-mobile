services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: valueit
      POSTGRES_PASSWORD: valueit
      POSTGRES_DB: valueit
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/valueit || true;
      mc anonymous set download local/valueit;
      exit 0;
      "

volumes:
  pgdata:
  miniodata:
